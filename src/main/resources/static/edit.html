<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактирование техники</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Редактирование техники</h1>
        <p>Режим: <strong>полный доступ</strong> (администратор)</p>
        
        <div class="search-section">
            <input type="text" id="searchName" placeholder="Название...">
            <input type="text" id="searchCountry" placeholder="Страна...">
            <input type="text" id="searchOkid2" placeholder="ОКПД2...">
            <select id="sortBy">
                <option value="name">По названию</option>
                <option value="count">По количеству</option>
                <option value="country">По стране</option>
            </select>
            <button onclick="loadData()">Найти</button>
            <button onclick="clearFilters()">Очистить</button>
        </div>
        
        <div class="add-form">
            <h3>Добавить новую технику</h3>
            <input type="text" id="newName" placeholder="Название">
            <input type="text" id="newCountry" placeholder="Страна">
            <input type="number" id="newCount" placeholder="Количество">
            <input type="text" id="newOkid2" placeholder="ОКПД2">
            <button onclick="addNewItem()">Добавить</button>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Страна</th>
                        <th>Количество</th>
                        <th>ОКПД2</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="pagination" id="pagination"></div>
        
        <a href="index.html" class="back-link">← Назад к выбору роли</a>
    </div>
    
    <script src="js/search.js"></script>
    <script>
        let currentPage = 0;
        
        async function loadData() {
            const params = {
                equipmentName: document.getElementById('searchName').value,
                country: document.getElementById('searchCountry').value,
                okid2: document.getElementById('searchOkid2').value,
                sortBy: document.getElementById('sortBy').value,
                page: currentPage
            };
            
            try {
                const data = await searchEquipment(params);
                renderTable(data.content);
                document.getElementById('stats').innerHTML = `Найдено: ${data.totalElements} записей, страница ${data.page + 1} из ${data.totalPages}`;
                renderPagination(data);
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="5" class="error-message">Ошибка: ${error.message}</td></tr>`;
            }
        }
        
        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            if (!items || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">Нет данных</td></tr>';
                return;
            }
            
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>${escapeHtml(item.name || '-')}</td>
                    <td>${escapeHtml(item.country || '-')}</td>
                    <td>${item.count || 0}</td>
                    <td>${escapeHtml(item.okid2 || '-')}</td>
                    <td class="actions">
                        <button class="action-btn edit-btn" onclick="editItem('${escapeHtml(item.name)}')">️EDT</button>
                        <button class="action-btn delete-btn" onclick="deleteItem('${escapeHtml(item.name)}')">DEL</button>
                    </td>
                </tr>
            `).join('');
        }
        
        function renderPagination(data) {
            const container = document.getElementById('pagination');
            if (data.totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            if (data.page > 0) {
                html += `<button onclick="goToPage(${data.page - 1})">◀ Предыдущая</button>`;
            }
            html += `<span>${data.page + 1} / ${data.totalPages}</span>`;
            if (data.page < data.totalPages - 1) {
                html += `<button onclick="goToPage(${data.page + 1})">Следующая ▶</button>`;
            }
            container.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            loadData();
        }
        
        function clearFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchCountry').value = '';
            document.getElementById('searchOkid2').value = '';
            currentPage = 0;
            loadData();
        }
        
        async function deleteItem(name) {
            if (confirm(`Удалить "${name}"?`)) {
                try {
                    await deleteEquipment(name);
                    alert('✅ Запись удалена');
                    loadData();
                } catch (error) {
                    alert('❌ Ошибка удаления: ' + error.message);
                }
            }
        }
        
        async function editItem(oldName) {
            const newName = prompt('Введите новое название:', oldName);
            if (newName && newName !== oldName) {
                try {
                    await updateEquipment(oldName, { name: newName });
                    alert('✅ Название обновлено');
                    loadData();
                } catch (error) {
                    alert('❌ Ошибка обновления: ' + error.message);
                }
            }
        }
        
       async function addNewItem() {
    const newName = document.getElementById('newName').value;
    const newCountry = document.getElementById('newCountry').value;
    const newCount = document.getElementById('newCount').value;
    const newOkid2 = document.getElementById('newOkid2').value;
    
    if (!newName) {
        alert('Введите название!');
        return;
    }
    
    try {
        await createEquipment({
            name: newName,
            country: newCountry || null,
            count: newCount ? parseInt(newCount) : 0,
            okid2: newOkid2 || null
        });
        alert('✅ Запись добавлена');
        document.getElementById('newName').value = '';
        document.getElementById('newCountry').value = '';
        document.getElementById('newCount').value = '';
        document.getElementById('newOkid2').value = '';
        loadData();
    } catch (error) {
        alert('❌ Ошибка добавления: ' + error.message);
    }

}
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Проверка роли - только admin
        const role = localStorage.getItem('userRole');
        if (role !== 'admin') {
            alert('⛔ У вас нет прав на редактирование!');
            window.location.href = 'view.html';
        }
        
        loadData();
    </script>
</body>
</html>
