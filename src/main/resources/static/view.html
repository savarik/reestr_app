<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр техники</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Просмотр техники</h1>
        <p>Режим: <strong>только чтение</strong> (обычный доступ)</p>
        
        <div class="search-section">
            <input type="text" id="searchName" placeholder="Название...">
            <input type="text" id="searchCountry" placeholder="Страна...">
            <input type="text" id="searchOkid2" placeholder="ОКПД2...">
            <select id="sortBy">
                <option value="name">По названию</option>
                <option value="count">По количеству</option>
                <option value="country">По стране</option>
            </select>
            <button onclick="loadData()">🔍 Найти</button>
            <button onclick="clearFilters()">❌ Очистить</button>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Страна</th>
                        <th>Количество</th>
                        <th>ОКПД2</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4" class="loading">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="pagination" id="pagination"></div>
        
        <a href="index.html" class="back-link">← Назад к выбору роли</a>
    </div>
    
    <script src="js/search.js"></script>
    <script>
        let currentPage = 0;
        
        async function loadData() {
            const params = {
                equipmentName: document.getElementById('searchName').value,
                country: document.getElementById('searchCountry').value,
                okid2: document.getElementById('searchOkid2').value,
                sortBy: document.getElementById('sortBy').value,
                page: currentPage
            };
            
            try {
                const data = await searchEquipment(params);
                renderTable(data.content);
                document.getElementById('stats').innerHTML = `Найдено: ${data.totalElements} записей, страница ${data.page + 1} из ${data.totalPages}`;
                renderPagination(data);
            } catch (error) {
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="4" class="error-message">❌ Ошибка: ${error.message}</td></tr>`;
            }
        }
        
        function renderTable(items) {
            const tbody = document.getElementById('tableBody');
            if (!items || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="loading">Нет данных</td></tr>';
                return;
            }
            
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td>${escapeHtml(item.name || '-')}</td>
                    <td>${escapeHtml(item.country || '-')}</td>
                    <td>${item.count || 0}</td>
                    <td>${escapeHtml(item.okid2 || '-')}</td>
                </tr>
            `).join('');
        }
        
        function renderPagination(data) {
            const container = document.getElementById('pagination');
            if (data.totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            if (data.page > 0) {
                html += `<button onclick="goToPage(${data.page - 1})">◀ Предыдущая</button>`;
            }
            html += `<span>${data.page + 1} / ${data.totalPages}</span>`;
            if (data.page < data.totalPages - 1) {
                html += `<button onclick="goToPage(${data.page + 1})">Следующая ▶</button>`;
            }
            container.innerHTML = html;
        }
        
        function goToPage(page) {
            currentPage = page;
            loadData();
        }
        
        function clearFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('searchCountry').value = '';
            document.getElementById('searchOkid2').value = '';
            currentPage = 0;
            loadData();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Проверка роли
        const role = localStorage.getItem('userRole');
        if (role !== 'viewer' && role !== 'admin') {
            window.location.href = 'index.html';
        }
        
        loadData();
    </script>
</body>
</html>
